<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    广东阳春 | 个人作品集
  </title>

  <meta
    name="description"
    content="广东阳春 个人作品集网站"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- 粒子 -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <!-- 图标 -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

</head>

<body>

  <!-- 开场动画 -->
  <div id="loader">

    <div class="loader-logo">
      广东阳春
    </div>

  </div>

  <!-- 粒子背景 -->
  <div id="particles-js"></div>

  <!-- 顶部 -->
  <header id="header">

    <div class="logo">
      广东阳春
    </div>

    <!-- 手机菜单按钮 -->
    <div id="menuBtn">
      ☰
    </div>

    <nav id="navMenu">

      <a href="#hero">首页</a>

      <a href="#gallery">作品</a>

      <a href="#skills">技能</a>

      <a href="#stats">数据</a>

      <a href="#video">视频</a>

      <a href="#contact">联系</a>

      <a href="#board">留言</a>

    </nav>

  </header>

  <!-- HERO -->
  <section id="hero">

    <div class="hero-content">

      <h1>
        个人作品集
      </h1>

      <p>
        Creative · Technology · Design
      </p>

      <a href="#gallery" class="hero-btn">
        查看作品
      </a>

    </div>

  </section>

  <!-- 数据 -->
  <section id="stats">

    <h2>网站数据</h2>

    <div class="stats-grid">

      <div class="stat-card">

        <h3 id="visitCount">
          0
        </h3>

        <p>访问人数</p>

      </div>

      <div class="stat-card">

        <h3>
          124
        </h3>

        <p>项目作品</p>

      </div>

      <div class="stat-card">

        <h3>
          8
        </h3>

        <p>开发技能</p>

      </div>

    </div>

  </section>

  <!-- 作品 -->
  <section id="gallery">

    <h2>作品展示</h2>

    <div class="carousel">

      <div
        class="carousel-track"
        id="carouselTrack"
      >

        <img
          src="images/work1.jpg"
          alt=""
        >

        <img
          src="images/work2.jpg"
          alt=""
        >

        <img
          src="images/work3.jpg"
          alt=""
        >

      </div>

      <div
        class="dots"
        id="dots"
      ></div>

    </div>

  </section>

  <!-- 技能 -->
  <section id="skills">

    <h2>我的技能</h2>

    <div class="skills-grid">

      <div class="skill-card">

        <i class="fa-solid fa-code"></i>

        <h3>网页开发</h3>

        <p>
          HTML / CSS / JavaScript
        </p>

      </div>

      <div class="skill-card">

        <i class="fa-solid fa-palette"></i>

        <h3>UI设计</h3>

        <p>
          科技感界面设计
        </p>

      </div>

      <div class="skill-card">

        <i class="fa-solid fa-robot"></i>

        <h3>AI应用</h3>

        <p>
          AI网站与交互开发
        </p>

      </div>

    </div>

  </section>

  <!-- 视频 -->
  <section id="video">

    <h2>视频展示</h2>

    <video controls>
      <source
        src="https://www.w3schools.com/html/mov_bbb.mp4"
        type="video/mp4"
      >
    </video>

  </section>

  <!-- 联系 -->
  <section id="contact">

    <h2>联系我</h2>

    <form
      action="https://formsubmit.co/411185785@qq.com"
      method="POST"
    >

      <input
        type="text"
        name="name"
        placeholder="姓名"
        required
      >

      <input
        type="email"
        name="email"
        placeholder="邮箱"
        required
      >

      <textarea
        name="message"
        placeholder="留言内容"
        required
      ></textarea>

      <input
        type="hidden"
        name="_captcha"
        value="false"
      >

      <button type="submit">
        发送留言
      </button>

    </form>

  </section>

  <!-- 留言 -->
  <section id="board">

    <h2>留言板</h2>

    <form id="msgForm">

      <input
        type="text"
        id="msgName"
        placeholder="你的名字"
        required
      >

      <textarea
        id="msgContent"
        placeholder="留言内容"
        required
      ></textarea>

      <button type="submit">
        发布留言
      </button>

    </form>

    <div id="messages"></div>

  </section>

  <!-- footer -->
  <footer>

    <div class="footer-social">

      <a href="#">
        <i class="fa-brands fa-github"></i>
      </a>

      <a href="#">
        <i class="fa-brands fa-weixin"></i>
      </a>

      <a href="#">
        <i class="fa-brands fa-weibo"></i>
      </a>

    </div>

    <p>
      © 2026 GDyangchun
    </p>

  </footer>

  <!-- JS -->
  <script src="script.js"></script>

</body>

</html>
